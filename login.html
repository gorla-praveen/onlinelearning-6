<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Login - eLearning</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .login-header {
            background: #0d6efd;
            color: white;
            padding: 25px;
            text-align: center;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
        }

        .btn-login {
            height: 50px;
            border-radius: 10px;
        }

        .login-footer {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm px-4">
    <a href="index.html" class="navbar-brand fw-bold text-primary">
        <i class="bi bi-book"></i> eLEARNING
    </a>
</nav>

<!-- LOGIN SECTION -->
<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card login-card">

                <div class="login-header">
                    <h3>Welcome Back</h3>
                    <p class="mb-0">Login to continue learning</p>
                </div>

                <div class="p-4">

                    <form>

                        <div class="mb-3">
                            <label>Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Enter password" required>
                        </div>

                        <button class="btn btn-primary btn-login w-100">
                            Login
                        </button>

                    </form>

                    <div class="login-footer">
                        <p class="mb-0">
                            Don't have an account?
                            <a href="join.html">Sign Up</a>
                        </p>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
