<!-- JOIN FORM -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-primary text-white text-center p-4">
                    <h2 class="mb-1">Join Now</h2>
                    <p class="mb-0">Start your learning journey today</p>
                </div>

                <!-- FORM -->
                <div class="p-4">

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control form-control-lg" placeholder="Enter your name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control form-control-lg" placeholder="Enter phone number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Course</label>
                            <select class="form-select form-select-lg" required>
                                <option value="">Choose Course</option>
                                <option>Web Development</option>
                                <option>Digital Marketing</option>
                                <option>UI/UX Design</option>
                                <option>Data Science</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="3" placeholder="Write your message"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3">
                            🚀 Enroll Now
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content text-center p-4">

            <h4 class="text-success fw-bold">Enrollment Successful!</h4>
            <p class="text-muted">We will contact you soon.</p>

            <button class="btn btn-primary" data-bs-dismiss="modal">
                OK
            </button>

        </div>

    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

<!-- Spinner Fix -->
<script>
window.onload = function () {
    const spinner = document.getElementById('spinner');
    if (spinner) {
        spinner.classList.remove('show');
    }
};
</script>
