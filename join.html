<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Join Now - Online Learning</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <!-- Your Template CSS (link your main css file here) -->
    <link href="css/style.css" rel="stylesheet">

</head>

<body>

<!-- JOIN NOW FORM START -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card shadow-lg border-0 p-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold">Join Now</h2>
                    <p class="text-muted">Start your learning journey with us</p>
                </div>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Course</label>
                        <select class="form-select" required>
                            <option value="">Choose Course</option>
                            <option>Web Development</option>
                            <option>Digital Marketing</option>
                            <option>UI/UX Design</option>
                            <option>Data Science</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="3" placeholder="Write your message"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Enroll Now
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>
<!-- JOIN NOW FORM END -->
<!-- SUCCESS MODAL -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <div class="modal-body">
        <h4 class="text-success fw-bold">Enrollment Successful!</h4>
        <p class="text-muted">Thank you! We will contact you soon.</p>

        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
          OK
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS FIRST -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your custom JS AFTER -->
<script src="js/main.js"></script>
</body>
</html>
